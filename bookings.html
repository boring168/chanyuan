<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>婵媛造型 | 内部预约记录</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Noto+Sans+SC:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="site-shell">
      <header class="topbar">
        <a class="brand" href="./index.html" aria-label="返回婵媛造型首页">
          <span class="brand__en">CHANYUAN</span>
          <span class="brand__cn">婵媛造型</span>
        </a>
        <div class="action-row">
          <button class="button button--ghost button--sm" id="logout-button" type="button">
            退出查看页
          </button>
          <a class="button button--secondary button--sm" href="./index.html">返回首页</a>
        </div>
      </header>

      <main class="subpage-main">
        <section class="subpage-hero card">
          <p class="eyebrow">Internal Records</p>
          <h1>内部预约记录</h1>
          <p id="records-gate-status">正在校验访问权限...</p>
        </section>

        <section class="records-layout" id="records-app" hidden>
          <div class="records-panel card">
            <div>
              <p class="eyebrow">Records</p>
              <h3>当前预约</h3>
              <p>这里只显示已经通过站内表单提交并写入系统的预约记录。</p>
            </div>
            <button class="button button--primary" id="load-bookings-button" type="button">
              刷新记录
            </button>
            <p class="status-text" id="admin-status" role="status" aria-live="polite"></p>
          </div>

          <div class="records-table-wrap card">
            <table class="records-table">
              <thead>
                <tr>
                  <th>提交时间</th>
                  <th>称呼</th>
                  <th>联系方式</th>
                  <th>服务</th>
                  <th>日期</th>
                  <th>时间段</th>
                  <th>时长</th>
                  <th>区域</th>
                  <th>备注</th>
                </tr>
              </thead>
              <tbody id="admin-bookings-body"></tbody>
            </table>
          </div>
        </section>
      </main>
    </div>

    <script src="./bookings.js" type="module"></script>
  </body>
</html>
